services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./site/hackathon.html:/usr/share/nginx/html/index.html:ro
      - ./site/hackathon.html:/usr/share/nginx/html/hackathon.html:ro
      - ./site/agenda.json:/usr/share/nginx/html/agenda.json:ro
    restart: unless-stopped
